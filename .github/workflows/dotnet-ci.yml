name: .NET CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Prn212_CI_StrongPassword_2026!
        ports:
          - 1433:1433
    env:
      PRN212_TEST_SQLSERVER_CONNECTION_STRING: Server=localhost,1433;User Id=sa;Password=Prn212_CI_StrongPassword_2026!;Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PRN212-VietnameseEduChat.sln

      - name: Build
        run: dotnet build PRN212-VietnameseEduChat.sln --no-restore --nologo

      - name: Test
        run: dotnet test PRN212-VietnameseEduChat.sln --no-build --nologo

      - name: Repository hygiene
        shell: pwsh
        run: ./scripts/verify-repository-hygiene.ps1
